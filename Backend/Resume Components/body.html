<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Helvetica', 'Verdana', 'Arial';
            width: 100%;
        }
        *{
            margin: 0 auto;
            padding: 0;
        }

        #header{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width:100%;
        }
        #headertop{
            width: 100%;
        }

        #name{
            width: 40%;
            float: left;
            text-align: left;
        }

        #smallbio{
            width: 60%;
            float: right;
            text-align: right;
        }

        #linkedinlink, #githublink{
            text-decoration: none;
            color: black;
        }

    </style>
</head>
<body>
    <div id="header">
        <div id="headertop">
            <h2 id="name">{{username}}</h2>
            <h3 id="smallbio">{{small_bio}}</h3>
        </div>
        <p>{{phone_number}} | {{emailid}} | <a id ="linkedinlink" href="{{linkedinlink}}">{{linkedin}}</a> | <a id ="githublink" href="{{githublink}}">{{github}}</a></p>
    </div>
    
</body>
</html>
